
services:
  postgres:
    image: postgres:16-alpine
    container_name: vendorbridge-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: vendorbridge
      POSTGRES_PASSWORD: vendorbridge_pass
      POSTGRES_DB: vendorbridge
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vendorbridge-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: vendorbridge-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@vendorbridge.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres
    networks:
      - vendorbridge-network

volumes:
  postgres_data:

networks:
  vendorbridge-network:
    driver: bridge
